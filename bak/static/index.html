<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FocusUp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --lime:    #a8ff3e;
      --lime2:   #7ddb1f;
      --mint:    #6effc8;
      --white:   #ffffff;
      --text:    rgba(255,255,255,0.92);
      --muted:   rgba(255,255,255,0.45);
      --muted2:  rgba(255,255,255,0.28);
      --high:    #ff6b6b;
      --medium:  #ffd06b;
      --low:     #6effc8;
      --glass-bg:    rgba(8, 30, 12, 0.55);
      --glass-bg2:   rgba(6, 22, 10, 0.65);
      --glass-bg3:   rgba(10, 36, 14, 0.72);
      --glass-border: rgba(255,255,255,0.13);
      --glass-border-bright: rgba(255,255,255,0.22);
      --blur: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }

    /* ══ INTERACTIVE GRADIENT BACKGROUND ══ */
    body {
      min-height: 100vh;
      font-family: "Syne", sans-serif;
      color: var(--text);
      background: #030d05;
      position: relative;
    }
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ══ LAYOUT ══ */
    .shell {
      position: relative; z-index: 1;
      max-width: 1300px; margin: 0 auto;
      padding: 0 28px 40px;
      min-height: 100vh;
    }

    /* ══ HEADER ══ */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 0 20px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 28px;
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-svg {
      width: 44px; height: 44px;
      filter: drop-shadow(0 0 14px rgba(168,255,62,0.45));
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .brand {
      font-size: 23px; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(130deg, #ffffff 0%, #c8ffaa 40%, #6effc8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tagline { font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; }

    /* Ghost add button */
    .btn-ghost-add {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 22px; border-radius: 12px;
      border: 1px dashed rgba(168,255,62,0.3);
      background: rgba(168,255,62,0.04);
      color: var(--muted); font-family: "Syne",sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.22s; position: relative; overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .btn-ghost-add:hover {
      border-color: var(--lime); color: var(--white);
      background: rgba(168,255,62,0.09);
      box-shadow: 0 0 24px rgba(168,255,62,0.18);
    }
    .add-icon {
      width: 24px; height: 24px; border-radius: 7px;
      border: 1px solid rgba(168,255,62,0.3);
      background: rgba(168,255,62,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.18s; color: var(--lime);
    }
    .btn-ghost-add:hover .add-icon {
      background: var(--lime); border-color: var(--lime); color: #0a1a04;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .tab-bar {
      width: fit-content;
      margin: 0 auto 18px;
      display: flex;
      gap: 6px;
      padding: 5px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      backdrop-filter: blur(var(--blur));
    }
    .tab-btn {
      padding: 9px 26px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: "Syne",sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }
    .tab-btn.active {
      background: var(--lime);
      color: #0a1a04;
      box-shadow: 0 0 18px rgba(168,255,62,0.4);
    }
    .tab-btn:not(.active):hover { color: var(--white); background: rgba(255,255,255,0.06); }
    .view { display: none; width: 100%; }
    .view.active { display: block; animation: fadeUp 0.22s ease; }

    /* ══ GLASS CARD base ══ */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border-radius: 20px;
      overflow: hidden;
    }
    .glass-inner {
      background: var(--glass-bg2);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border-radius: 14px;
    }

    /* ══ TASKS VIEW ══ */
    .tasks-layout {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      animation: fadeUp 0.22s ease;
    }
    .stats-panel {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--blur));
      border-radius: 16px; padding: 18px 16px;
      cursor: pointer; transition: all 0.18s; user-select: none;
      text-align: center;
    }
    .stat-card:hover { border-color: var(--glass-border-bright); transform: translateY(-2px); }
    .stat-card.active { border-color: rgba(168,255,62,0.5); background: rgba(168,255,62,0.06); }
    .sc-num { font-family: "JetBrains Mono",monospace; font-size: 32px; font-weight: 700; line-height: 1; }
    .sc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; }
    .sc-todo { color: #a78bfa; }
    .sc-prog  { color: var(--medium); }
    .sc-done  { color: var(--lime); }
    .sc-urg   { color: var(--high); }

    .content-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .tasks-side,
    .calendar-side {
      width: 100%;
      max-width: 1240px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Filters */
    .filters-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .qf {
      padding: 5px 13px; border-radius: 7px;
      border: 1px solid var(--glass-border);
      background: transparent; color: var(--muted);
      font-family: "Syne",sans-serif; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.12s;
      backdrop-filter: blur(6px);
    }
    .qf:hover, .qf.active { border-color: var(--lime); color: var(--lime); background: rgba(168,255,62,0.06); }

    /* Tasks list */
    .tasks-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--blur));
      border-radius: 20px;
      overflow: hidden;
      position: sticky; top: 24px;
      max-height: calc(100vh - 110px);
      display: flex; flex-direction: column;
    }
    .tp-header {
      padding: 16px 18px 13px;
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .tp-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: var(--muted); }
    .tp-count {
      font-family: "JetBrains Mono",monospace; font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      padding: 3px 9px; border-radius: 6px;
    }
    .tasks-scroll { overflow-y: auto; flex: 1; padding: 10px; }
    .tasks-scroll::-webkit-scrollbar { width: 3px; }
    .tasks-scroll::-webkit-scrollbar-thumb { background: rgba(168,255,62,0.2); border-radius: 3px; }
    .tasks-list { display: flex; flex-direction: column; gap: 8px; }

    /* Task card */
    .task-card {
      background: rgba(10,28,12,0.6);
      border: 1px solid var(--glass-border);
      border-radius: 13px; padding: 13px 13px 11px;
      display: flex; gap: 11px; align-items: flex-start;
      backdrop-filter: blur(8px);
      transition: all 0.14s; cursor: default;
      animation: fadeUp 0.18s ease;
    }
    .task-card:hover { border-color: var(--glass-border-bright); transform: translateX(3px); }
    .task-card.done-card { opacity: 0.38; }
    .task-chk {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid rgba(168,255,62,0.35);
      background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.13s; font-size: 11px; color: #0a1a04;
    }
    .task-chk:hover { border-color: var(--lime); box-shadow: 0 0 10px rgba(168,255,62,0.3); }
    .task-chk.checked { background: var(--lime); border-color: var(--lime); box-shadow: 0 0 12px rgba(168,255,62,0.45); }
    .task-body { flex: 1; min-width: 0; }
    .task-title-t { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .done-card .task-title-t { text-decoration: line-through; color: var(--muted); }
    .task-meta-row { display: flex; gap: 7px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
    .badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: 0.7px; font-family: "JetBrains Mono",monospace;
    }
    .ph { background: rgba(255,107,107,0.14); color: var(--high); border: 1px solid rgba(255,107,107,0.25); }
    .pm { background: rgba(255,208,107,0.14); color: var(--medium); border: 1px solid rgba(255,208,107,0.25); }
    .pl { background: rgba(110,255,200,0.1); color: var(--low); border: 1px solid rgba(110,255,200,0.2); }
    .st-todo { background: rgba(167,139,250,0.1); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }
    .st-prog  { background: rgba(255,208,107,0.1); color: var(--medium); border: 1px solid rgba(255,208,107,0.2); }
    .st-done  { background: rgba(168,255,62,0.1); color: var(--lime); border: 1px solid rgba(168,255,62,0.2); }
    .due-lbl { font-size: 10px; color: var(--muted); font-family: "JetBrains Mono",monospace; }
    .due-lbl.overdue { color: var(--high); }
    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      width: 27px; height: 27px; border-radius: 7px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      color: var(--muted); cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center; transition: all 0.13s;
    }
    .icon-btn:hover { color: var(--white); border-color: var(--glass-border-bright); }
    .icon-btn.del:hover { color: var(--high); border-color: rgba(255,107,107,0.4); }
    .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
    .empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 10px; }
    .empty h3 { font-size: 14px; color: rgba(255,255,255,0.35); }

    /* ══ CALENDAR VIEW ══ */
    .cal-wrapper {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--blur));
      border-radius: 20px; overflow: hidden;
    }
    .cal-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 15px; border-bottom: 1px solid var(--glass-border);
    }
    .cal-nav-row { display: flex; align-items: center; gap: 14px; }
    .cal-nav-btn {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      color: var(--muted); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.14s;
    }
    .cal-nav-btn:hover { border-color: var(--lime); color: var(--lime); box-shadow: 0 0 12px rgba(168,255,62,0.2); }
    .cal-month { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; min-width: 200px; text-align: center; }
    .cal-today-btn {
      padding: 8px 16px; border-radius: 9px;
      background: rgba(168,255,62,0.07); border: 1px solid rgba(168,255,62,0.22);
      color: var(--lime); font-family: "Syne",sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.14s;
    }
    .cal-today-btn:hover { background: rgba(168,255,62,0.14); box-shadow: 0 0 14px rgba(168,255,62,0.2); }
    .cal-legend {
      display: flex; gap: 16px; padding: 10px 22px;
      border-bottom: 1px solid var(--glass-border); flex-wrap: wrap; align-items: center;
    }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .leg-dot { width: 8px; height: 8px; border-radius: 2px; }
    .cal-hint { margin-left: auto; font-size: 10px; color: var(--muted2); }
    .cal-body { padding: 16px 18px 20px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 7px; }
    .cal-dow {
      text-align: center; font-size: 10px; font-weight: 700;
      color: var(--muted2); letter-spacing: 1px; text-transform: uppercase; padding: 6px 0;
    }
    .cal-cell {
      background: rgba(8,26,10,0.5);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px);
      border-radius: 11px; min-height: 100px; padding: 8px 7px 6px;
      cursor: pointer; transition: all 0.14s; position: relative; overflow: hidden;
    }
    .cal-cell:hover { border-color: rgba(168,255,62,0.4); background: rgba(168,255,62,0.04); }
    .cal-cell::before {
      content:""; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(168,255,62,0.03),transparent);
      opacity:0; transition: opacity 0.14s;
      pointer-events: none;
    }
    .cal-cell:hover::before { opacity:1; }
    .cal-cell.other { opacity: 0.25; }
    .cal-cell.today { border-color: rgba(168,255,62,0.55); background: rgba(168,255,62,0.07); }
    .cal-cell.has-t { border-color: rgba(168,255,62,0.2); }
    .day-num {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;
    }
    .day-n {
      font-size: 11px; font-weight: 700; font-family: "JetBrains Mono",monospace;
      color: var(--muted2); transition: color 0.14s;
    }
    .cal-cell.today .day-n { color: var(--lime); }
    .day-add {
      width: 16px; height: 16px; border-radius: 4px;
      background: rgba(168,255,62,0.08); border: 1px solid rgba(168,255,62,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--lime); opacity: 0; transition: opacity 0.12s;
    }
    .cal-cell:hover .day-add { opacity: 1; }
    .cell-tasks { display: flex; flex-direction: column; gap: 3px; position: relative; z-index: 1; }
    .ctask {
      font-size: 9.5px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: opacity 0.12s;
    }
    .ctask:hover { opacity: 0.7; }
    .ctask.cph { background: rgba(255,107,107,0.15); color: var(--high); border-left: 2px solid var(--high); }
    .ctask.cpm { background: rgba(255,208,107,0.15); color: var(--medium); border-left: 2px solid var(--medium); }
    .ctask.cpl { background: rgba(168,255,62,0.1); color: var(--lime); border-left: 2px solid var(--lime); }
    .ctask.cdone { opacity: 0.3; text-decoration: line-through; }
    .cmore { font-size: 9px; color: var(--muted); margin-top: 2px; font-family: "JetBrains Mono",monospace; }

    /* ══ FORM FIELDS ══ */
    .f-label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .f-input {
      width: 100%; background: rgba(8,26,10,0.7); border: 1px solid rgba(168,255,62,0.15);
      color: var(--text); border-radius: 9px; padding: 9px 12px;
      font-family: "Syne",sans-serif; font-size: 13px; transition: border-color 0.14s; resize: none;
      backdrop-filter: blur(6px);
    }
    .f-input:focus { outline: none; border-color: rgba(168,255,62,0.5); box-shadow: 0 0 14px rgba(168,255,62,0.1); }
    .f-input::placeholder { color: var(--muted2); }
    .f-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 9px; }
    .f-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
    .f-field { margin-bottom: 0; }
    .f-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .btn-lime {
      padding: 9px 20px; border-radius: 10px; border: none;
      background: var(--lime); color: #0a1a04;
      font-family: "Syne",sans-serif; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: all 0.15s;
      box-shadow: 0 0 18px rgba(168,255,62,0.35);
    }
    .btn-lime:hover { background: #c4ff5e; transform: translateY(-1px); box-shadow: 0 0 26px rgba(168,255,62,0.5); }
    .btn-ghost {
      padding: 9px 16px; border-radius: 10px;
      background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.1);
      font-family: "Syne",sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.14s;
    }
    .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.22); }
    .due-hint { font-size: 9px; color: rgba(168,255,62,0.5); margin-top: 3px; }

    /* ══ MODALS ══ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,10,2,0.82);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: rgba(8,24,10,0.92);
      border: 1px solid rgba(168,255,62,0.2);
      backdrop-filter: blur(24px);
      border-radius: 22px; padding: 28px; width: 100%; max-width: 500px;
      animation: fadeUp 0.18s ease;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(168,255,62,0.05);
    }
    .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }
    .modal-date { font-size: 10px; color: var(--lime); font-family: "JetBrains Mono",monospace; letter-spacing: 1.2px; margin-bottom: 14px; text-transform: uppercase; }
    .m-field { margin-bottom: 11px; }

    /* ══ TOAST ══ */
    .toast {
      position: fixed; bottom: 22px; right: 22px;
      background: rgba(8,24,10,0.9); border: 1px solid rgba(168,255,62,0.25);
      backdrop-filter: blur(12px);
      border-radius: 12px; padding: 12px 18px;
      font-size: 13px; font-weight: 600; z-index: 300;
      transform: translateY(70px); opacity: 0; transition: all 0.25s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok  { border-color: rgba(168,255,62,0.45); color: var(--lime); }
    .toast.err { border-color: rgba(255,107,107,0.45); color: var(--high); }

    @media (max-width: 960px) {
      .stats-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tasks-panel { position:static; max-height:none; }
    }
    @media (max-width: 600px) {
      .shell { padding: 0 12px 24px; }
      .tab-bar { width: 100%; }
      .tab-btn { flex: 1; padding-inline: 12px; }
      .stats-panel { grid-template-columns: 1fr; }
      .cal-cell { min-height: 68px; padding: 5px; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <svg class="logo-svg" viewBox="0 0 44 44" fill="none">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e8ffc0"/>
            <stop offset="50%" stop-color="#a8ff3e"/>
            <stop offset="100%" stop-color="#6effc8"/>
          </linearGradient>
          <linearGradient id="lg2" x1="22" y1="5" x2="22" y2="39" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#c8ffaa" stop-opacity="0.75"/>
          </linearGradient>
        </defs>
        <rect width="44" height="44" rx="12" fill="url(#lg1)"/>
        <path d="M22 34 L22 14" stroke="#0a1a04" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M15 21.5 L22 14 L29 21.5" stroke="#0a1a04" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="12" r="3.2" fill="none" stroke="#0a1a04" stroke-width="2"/>
        <circle cx="14.5" cy="31.5" r="1.8" fill="#0a1a04" opacity="0.7"/>
        <circle cx="19.5" cy="31.5" r="1.8" fill="#0a1a04" opacity="0.5"/>
        <circle cx="24.5" cy="31.5" r="1.8" fill="#0a1a04" opacity="0.3"/>
      </svg>
      <div class="logo-text">
        <span class="brand">FocusUp</span>
        <span class="tagline">Task Manager</span>
      </div>
    </div>
    <button class="btn-ghost-add" onclick="openCreateModal()">
      <span class="add-icon">+</span>
      <span>Новая задача</span>
    </button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tasks',this)">📋 Задачи</button>
    <button class="tab-btn" onclick="switchTab('calendar',this)">📅 Календарь</button>
  </div>

  <div class="tasks-layout">
    <div class="stats-panel">
      <div class="stat-card" id="sc-todo" onclick="fCard('todo',this)">
        <div class="sc-num sc-todo" id="st-todo">0</div>
        <div class="sc-label">К выполнению</div>
      </div>
      <div class="stat-card" id="sc-prog" onclick="fCard('in_progress',this)">
        <div class="sc-num sc-prog" id="st-prog">0</div>
        <div class="sc-label">В процессе</div>
      </div>
      <div class="stat-card" id="sc-done" onclick="fCard('done',this)">
        <div class="sc-num sc-done" id="st-done">0</div>

      </div>
      <div class="stat-card" id="sc-urg" onclick="fCard('high_priority',this)">
        <div class="sc-num sc-urg" id="st-urg">0</div>
        <div class="sc-label">Срочных</div>
      </div>
    </div>

    <div class="content-grid">
      <div class="view active" id="view-tasks">
        <div class="tasks-side">
        <div class="tasks-panel">
          <div class="tp-header">
            <span class="tp-title">Задачи</span>
            <span class="tp-count" id="panelCount">0 задач</span>
          </div>
          <div style="padding:10px 12px 0; flex-shrink:0;">
            <div class="filters-row">
              <button class="qf active" id="fb-all" onclick="setF('all',this)">Все</button>
              <button class="qf" id="fb-todo" onclick="setF('todo',this)">К выполнению</button>
              <button class="qf" id="fb-prog" onclick="setF('in_progress',this)">В процессе</button>
              <button class="qf" id="fb-done" onclick="setF('done',this)">Завершено</button>
              <button class="qf" id="fb-urg" onclick="setF('high_priority',this)">🔴 Срочные</button>
            </div>
          </div>
          <div class="tasks-scroll">
            <div class="tasks-list" id="tasksList">
              <div class="empty"><div class="empty-icon">📋</div><h3>Загрузка...</h3></div>
            </div>
          </div>
        </div>
      </div>
      </div>

      <div class="view" id="view-calendar">
        <div class="calendar-side">
        <div class="cal-wrapper">
          <div class="cal-top">
            <div class="cal-nav-row">
              <button class="cal-nav-btn" onclick="calPrev()">‹</button>
              <div class="cal-month" id="calMonth"></div>
              <button class="cal-nav-btn" onclick="calNext()">›</button>
            </div>
            <button class="cal-today-btn" onclick="calToday()">Сегодня</button>
          </div>

          <div class="cal-body">
            <div class="cal-grid" id="calGrid"></div>
          </div>
        </div>
      </div>
      </div>
    </div>
  </div>

</div>

<!-- Modal: Edit task -->
<div class="overlay" id="editModal">
  <div class="modal">
    <h2>Редактировать задачу</h2>
    <input type="hidden" id="editId"/>
    <div class="m-field"><label class="f-label">Название</label><input class="f-input" type="text" id="editTitle" maxlength="200"/></div>
    <div class="m-field"><label class="f-label">Описание</label><textarea class="f-input" id="editDesc" rows="3"></textarea></div>
    <div class="f-row3" style="margin-bottom:0">
      <div class="m-field"><label class="f-label">Статус</label>
        <select class="f-input" id="editStatus">
          <option value="todo">К выполнению</option>
          <option value="in_progress">В процессе</option>
          <option value="done">Завершено</option>
        </select>
      </div>
      <div class="m-field"><label class="f-label">Приоритет</label>
        <select class="f-input" id="editPriority">
          <option value="low">🟢 Низкий</option>
          <option value="medium">🟡 Средний</option>
          <option value="high">🔴 Высокий</option>

      <div class="m-field"><label class="f-label">Дедлайн</label><input class="f-input" type="date" id="editDue"/></div>
    </div>
    <div class="f-actions" style="margin-top:16px">
      <button class="btn-ghost" onclick="closeEdit()">Отмена</button>
      <button class="btn-lime" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: Create task -->
<div class="overlay" id="createModal">
  <div class="modal">
    <h2>Новая задача</h2>
    <div class="modal-date" id="createModalDate"></div>
    <div class="m-field"><label class="f-label">Название *</label><input class="f-input" type="text" id="createTitle" placeholder="Что нужно сделать?" maxlength="200"/></div>
    <div class="m-field"><label class="f-label">Описание</label><textarea class="f-input" id="createDesc" rows="2" placeholder="Подробности..."></textarea></div>
    <div class="f-row2" style="margin-top:0">
      <div class="m-field"><label class="f-label">Приоритет</label>
        <select class="f-input" id="createPriority">
          <option value="low">🟢 Низкий</option>
          <option value="medium" selected>🟡 Средний</option>
          <option value="high">🔴 Высокий</option>
        </select>
      </div>
      <div class="m-field">
        <label class="f-label">Дата</label>
        <input class="f-input" type="date" id="createDue" style="opacity:.75"/>
        <div class="due-hint">📅 задача появится и в календаре, и в списке</div>
      </div>
    </div>
    <div class="f-actions" style="margin-top:14px">
      <button class="btn-ghost" onclick="closeCreateModal()">Отмена</button>
      <button class="btn-lime" onclick="submitCreateTask()">Создать задачу</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ INTERACTIVE GRADIENT BACKGROUND ══
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let tx = mx, ty = my;

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });

  function draw(){
    mx += (tx-mx)*0.06; my += (ty-my)*0.06;
    const w=canvas.width, h=canvas.height;
    ctx.clearRect(0,0,w,h);

    // base deep green
    ctx.fillStyle='#02080302';
    ctx.fillRect(0,0,w,h);

    // radial glow following cursor
    const r = Math.min(w,h)*0.65;
    const g1 = ctx.createRadialGradient(mx,my,0,mx,my,r);
    g1.addColorStop(0,  'rgba(80,160,30,0.22)');
    g1.addColorStop(0.3,'rgba(40,100,15,0.14)');
    g1.addColorStop(0.6,'rgba(10,40,5,0.08)');
    g1.addColorStop(1,  'rgba(2,8,1,0)');
    ctx.fillStyle = g1;
    ctx.fillRect(0,0,w,h);

    // secondary mint accent
    const r2 = Math.min(w,h)*0.35;
    const g2 = ctx.createRadialGradient(mx,my,0,mx,my,r2);
    g2.addColorStop(0, 'rgba(110,255,200,0.08)');
    g2.addColorStop(1, 'rgba(110,255,200,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0,0,w,h);

    // corners — deep dark
    const gc = ctx.createRadialGradient(w/2,h/2,Math.min(w,h)*0.2,w/2,h/2,Math.max(w,h)*0.85);
    gc.addColorStop(0,'rgba(0,0,0,0)');
    gc.addColorStop(1,'rgba(0,6,1,0.72)');
    ctx.fillStyle=gc;
    ctx.fillRect(0,0,w,h);

    requestAnimationFrame(draw);
  }
  draw();
})();

// ══ APP STATE ══
let tasks=[], filter='all';
const _now=new Date();
let calY=_now.getFullYear(), calM=_now.getMonth();
const MOS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const DOW=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

// ── Data ────────────────────────────────────────────────────────
async function loadTasks(){
  try{
    tasks=(await (await fetch('/api/tasks')).json()).tasks;
    renderTasks(); renderCalendar();
  }catch(e){toast('Ошибка загрузки','err');}
}
async function loadStats(){
  try{
    const s=await(await fetch('/api/stats')).json();
    document.getElementById('st-todo').textContent=s.todo;
    document.getElementById('st-prog').textContent=s.in_progress;
    document.getElementById('st-done').textContent=s.done;
    document.getElementById('st-urg').textContent=s.high_priority;
  }catch(e){}
}
function refresh(){ loadTasks(); loadStats(); }

// ── Render tasks ─────────────────────────────────────────────────
function renderTasks(){
  let t=[...tasks];
  if(filter==='todo')          t=t.filter(x=>x.status==='todo');
  else if(filter==='in_progress') t=t.filter(x=>x.status==='in_progress');
  else if(filter==='done')     t=t.filter(x=>x.status==='done');
  else if(filter==='high_priority') t=t.filter(x=>x.priority==='high'&&x.status!=='done');
  document.getElementById('panelCount').textContent=t.length+' '+plural(t.length);
  const l=document.getElementById('tasksList');
  if(!t.length){l.innerHTML=`<div class="empty"><div class="empty-icon">✦</div><h3>Задач нет</h3></div>`;return;}
  l.innerHTML=t.map(cardHTML).join('');
}
function plural(n){
  if(n%10===1&&n%100!==11)return'задача';
  if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return'задачи';
  return'задач';
}
function cardHTML(t){
  const done=t.status==='done';
  const pL={high:'Высокий',medium:'Средний',low:'Низкий'};
  const sL={todo:'К выполнению',in_progress:'В процессе',done:'Завершено'};
  const pc={high:'ph',medium:'pm',low:'pl'}[t.priority];
  const sc={todo:'st-todo',in_progress:'st-prog',done:'st-done'}[t.status];
  const tod=new Date().toISOString().split('T')[0];
  const over=t.due_date&&t.due_date<tod&&!done;
  const due=t.due_date?`<span class="due-lbl ${over?'overdue':''}">📅${over?' ⚠':''} ${t.due_date}</span>`:'';
  return`<div class="task-card ${done?'done-card':''}" id="tk-${t.id}">
    <div class="task-chk ${done?'checked':''}" onclick="toggleDone(${t.id},${done})">${done?'✓':''}</div>
    <div class="task-body">
      <div class="task-title-t">${esc(t.title)}</div>
      <div class="task-meta-row">
        ${due}
        <span class="badge ${pc}">${pL[t.priority]}</span>
        <span class="badge ${sc}">${sL[t.status]}</span>
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="openEdit(${t.id})">✎</button>
      <button class="icon-btn del" onclick="delTask(${t.id})">✕</button>
    </div></div>`;
}

// ── CRUD ─────────────────────────────────────────────────────────
async function toggleDone(id,isDone){
  await fetch(`/api/tasks/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({status:isDone?'todo':'done'})});
  refresh();
}
async function delTask(id){
  if(!confirm('Удалить задачу?'))return;
  await fetch(`/api/tasks/${id}`,{method:'DELETE'});
  toast('Задача удалена','ok'); refresh();
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  document.getElementById('editId').value=t.id;
  document.getElementById('editTitle').value=t.title;
  document.getElementById('editDesc').value=t.description;
  document.getElementById('editStatus').value=t.status;
  document.getElementById('editPriority').value=t.priority;
  document.getElementById('editDue').value=t.due_date||'';
  document.getElementById('editModal').classList.add('open');
}
function closeEdit(){document.getElementById('editModal').classList.remove('open');}
async function saveEdit(){
  const id=document.getElementById('editId').value;
  const body={title:document.getElementById('editTitle').value.trim(),
    description:document.getElementById('editDesc').value.trim(),
    status:document.getElementById('editStatus').value,
    priority:document.getElementById('editPriority').value,
    due_date:document.getElementById('editDue').value||null};
  if(!body.title){toast('Название обязательно','err');return;}
  const res=await fetch(`/api/tasks/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){toast('Ошибка сохранения','err');return;}
  closeEdit(); toast('Изменения сохранены','ok'); refresh();
}

// ── Filters ───────────────────────────────────────────────────────
function setF(f,btn){
  filter=f;
  document.querySelectorAll('.qf').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  const m={todo:'sc-todo',in_progress:'sc-prog',done:'sc-done',high_priority:'sc-urg'};
  if(m[f])document.getElementById(m[f]).classList.add('active');
  renderTasks();
}
function fCard(f,card){
  const tasksTabBtn=document.querySelectorAll('.tab-btn')[0];
  if(!document.getElementById('view-tasks').classList.contains('active') && tasksTabBtn){
    switchTab('tasks',tasksTabBtn);
  }

  if(filter===f){
    filter='all';
    document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.qf').forEach(b=>b.classList.remove('active'));
    document.getElementById('fb-all').classList.add('active');
  }else{
    filter=f;
    document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.qf').forEach(b=>b.classList.remove('active'));
    card.classList.add('active');
    const m={todo:'fb-todo',in_progress:'fb-prog',done:'fb-done',high_priority:'fb-urg'};
    if(m[f])document.getElementById(m[f]).classList.add('active');
  }
  renderTasks();
}
function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
  if(name==='calendar') renderCalendar();
}

// ── Calendar ──────────────────────────────────────────────────────
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCalendar();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCalendar();}
function calToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCalendar();}

function renderCalendar(){
  document.getElementById('calMonth').textContent=MOS[calM]+' '+calY;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  DOW.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  let sd=new Date(calY,calM,1).getDay();
  sd=sd===0?6:sd-1;
  const dim=new Date(calY,calM+1,0).getDate();
  const dipm=new Date(calY,calM,0).getDate();
  const tod=new Date().toISOString().split('T')[0];
  const tbd={};
  tasks.forEach(t=>{if(t.due_date){if(!tbd[t.due_date])tbd[t.due_date]=[];tbd[t.due_date].push(t);}});
  for(let i=0;i<sd;i++){const d=dipm-sd+1+i,pm=calM===0?11:calM-1,py=calM===0?calY-1:calY;mkCell(grid,d,py,pm,true,tbd,tod);}
  for(let d=1;d<=dim;d++)mkCell(grid,d,calY,calM,false,tbd,tod);
  const tot=sd+dim,rem=tot%7===0?0:7-(tot%7);
  for(let d=1;d<=rem;d++){const nm=calM===11?0:calM+1,ny=calM===11?calY+1:calY;mkCell(grid,d,ny,nm,true,tbd,tod);}
}

function mkCell(grid,day,year,month,other,tbd,tod){
  const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const isToday=ds===tod;
  const t=tbd[ds]||[];
  const cell=document.createElement('div');
  cell.className='cal-cell'+(other?' other':'')+(isToday?' today':'')+(t.length?' has-t':'');
  cell.onclick=()=>openCreateModal(ds);
  const dn=document.createElement('div');dn.className='day-num';
  dn.innerHTML=`<span class="day-n">${day}</span><span class="day-add">+</span>`;
  cell.appendChild(dn);
  const w=document.createElement('div');w.className='cell-tasks';
  const ord={high:0,medium:1,low:2};
  t.sort((a,b)=>ord[a.priority]-ord[b.priority]);
  t.slice(0,3).forEach(x=>{
    const p=document.createElement('div');
    p.className=`ctask c${{high:'ph',medium:'pm',low:'pl'}[x.priority]}${x.status==='done'?' cdone':''}`;
    p.textContent=x.title;
    p.title=`Редактировать: ${x.title}`;
    p.onclick=e=>openCalendarTaskEdit(e,x.id);
    w.appendChild(p);
  });
  if(t.length>3){const m=document.createElement('div');m.className='cmore';m.textContent=`+${t.length-3} ещё`;w.appendChild(m);}
  cell.appendChild(w);grid.appendChild(cell);
}

let _createDate='';
function openCalendarTaskEdit(e,id){
  e.stopPropagation();
  openEdit(id);
}
function openCreateModal(ds=''){
  _createDate=ds || '';
  document.getElementById('createModalDate').textContent=formatCreateModalDate(_createDate);
  document.getElementById('createDue').value=_createDate;
  document.getElementById('createTitle').value='';
  document.getElementById('createDesc').value='';
  document.getElementById('createPriority').value='medium';
  document.getElementById('createModal').classList.add('open');
  setTimeout(()=>document.getElementById('createTitle').focus(),80);
}
function closeCreateModal(){document.getElementById('createModal').classList.remove('open');}
function formatCreateModalDate(ds){
  if(!ds) return 'Без даты: можно создать задачу только для списка';
  const[y,m,d]=ds.split('-');
  return '📅 '+parseInt(d)+' '+MOS[parseInt(m)-1]+' '+y;
}
async function submitCreateTask(){
  const title=document.getElementById('createTitle').value.trim();
  if(!title){toast('Введите название','err');return;}
  const due=document.getElementById('createDue').value||null;
  const res=await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,description:document.getElementById('createDesc').value.trim(),
      priority:document.getElementById('createPriority').value,due_date:due})});
  if(!res.ok){const e=await res.json();toast(e.error,'err');return;}
  closeCreateModal();
  toast('Задача создана'+(due?' и добавлена в календарь 📅':''),'ok');
  refresh();
}

// ── Helpers ────────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3200);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEdit();});
document.getElementById('createModal').addEventListener('click',function(e){if(e.target===this)closeCreateModal();});
document.getElementById('createTitle').addEventListener('keydown',e=>{if(e.key==='Enter')submitCreateTask();});

refresh();
</script>
</body>
